{% extends "sns/base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form method="POST" action="{% url 'sns:create' %}">
                        {% csrf_token %}
                        {{ form.content }}
                        <button type="submit" class="btn btn-primary float-end mt-2">投稿する</button>
                    </form>
                </div>
            </div>

            {% for post in posts %}
            <div class="card mb-3 shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <div class="me-3">
                            {% if post.author.profile.image %}
                                <img src="{{ post.author.profile.image.url }}" class="profile-img" style="width: 45px; height: 45px;">
                            {% else %}
                                <div class="bg-secondary profile-img" style="width: 45px; height: 45px;"></div>
                            {% endif %}
                        </div>
                        <div>
                            <a href="{% url 'sns:user_posts' post.author.username %}" class="fw-bold text-decoration-none">@{{ post.author.username }}</a>
                            <div class="text-muted small">{{ post.created_at|date:"Y/m/d H:i" }}</div>
                        </div>
                    </div>
                    <p class="card-text fs-5">{{ post.content }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
