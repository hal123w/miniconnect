<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール編集 - MiniConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #007bff; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">MiniConnect</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4">プロフィール編集</h3>
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">ユーザー名</label>
                            {{ u_form.username }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">プロフィール画像</label>
                            <div class="border p-2 rounded bg-light">
                                {{ p_form.image }}
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">自己紹介</label>
                            {{ p_form.bio }}
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg" type="submit">保存する</button>
                            <a href="/" class="btn btn-link text-secondary">キャンセルして戻る</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 入力欄を綺麗にする魔法
    window.onload = function() {
        const tags = document.querySelectorAll('input[type="text"], textarea');
        tags.forEach(t => t.classList.add('form-control'));
    };
</script>

</body>
</html>
