{% extends "sns/base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title mb-4">プロフィール編集</h2>
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <h5 class="text-secondary">ユーザー情報</h5>
                            {{ u_form.as_p }}
                        </div>
                        
                        <hr>
                        
                        <div class="mb-3">
                            <h5 class="text-secondary">プロフィール詳細</h5>
                            {{ p_form.as_p }}
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">更新する</button>
                            <a href="{% url 'sns:index' %}" class="btn btn-light">キャンセル</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
