{% extends "sns/base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4">プロフィール編集</h3>
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">ユーザー名</label>
                            {{ u_form.username }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">アイコン画像</label>
                            {{ p_form.image }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">自己紹介</label>
                            {{ p_form.bio }}
                        </div>
                        
                        <button class="btn btn-primary w-100" type="submit">更新する</button>
                    </form>
                    
                    <div class="mt-3 text-center">
                        <a href="{% url 'sns:index' %}">戻る</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
