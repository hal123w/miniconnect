<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ profile_user.username }}さんの投稿 - MiniConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'sns:index' %}">MiniConnect</a>
            <a href="{% url 'sns:index' %}" class="btn btn-outline-light btn-sm">ホームに戻る</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <h3 class="mb-4 fw-bold text-secondary">
                    <i class="bi bi-person-circle"></i> @{{ profile_user.username }} さんの投稿
                </h3>

                {% for post in posts %}
                <div class="card mb-3 shadow-sm border-0">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-2">
                            <span class="fw-bold text-primary">@{{ post.author.username }}</span>
                            <span class="ms-auto small text-muted">{{ post.created_at|date:"n/j H:i" }}</span>
                        </div>
                        <p class="card-text fs-5" style="white-space: pre-wrap;">{{ post.content }}</p>
                    </div>
                </div>
                {% empty %}
                <p class="text-center text-muted py-5">まだ投稿がありません。</p>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
