<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - MiniConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold text-primary">MiniConnect</h2>
                        <p class="text-center text-muted mb-4">ログインして仲間と繋がろう</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">ユーザー名</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">パスワード</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary fw-bold">ログイン</button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="{% url 'sns:index' %}" class="text-decoration-none small text-secondary">← ホームに戻る</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
