<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録 - MiniConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold text-primary">新規アカウント作成</h2>
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }} <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary fw-bold">登録する</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <a href="{% url 'login' %}" class="text-decoration-none small text-secondary">すでにアカウントをお持ちの方はこちら</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
